version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: connor-postgres
    environment:
      POSTGRES_USER: connor
      POSTGRES_PASSWORD: connor_dev
      POSTGRES_DB: connor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connor"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
